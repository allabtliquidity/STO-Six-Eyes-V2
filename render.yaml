services:
  - type: web
    name: sto-six-eyes
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/healthz
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
